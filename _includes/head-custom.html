<script src="{{ '/assets/js/mermaid.min.js' | relative_url }}"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    // kramdown renders ```mermaid as <pre><code class="language-mermaid">
    // Mermaid v10+ also supports this selector directly, but we normalise
    // to <pre class="mermaid"> for maximum compatibility across diagram types.
    document.querySelectorAll('pre > code.language-mermaid').forEach(function (code) {
      var pre = document.createElement('pre');
      pre.className = 'mermaid';
      pre.textContent = code.textContent;
      code.parentNode.replaceWith(pre);
    });

    mermaid.initialize({ startOnLoad: true, theme: 'default' });
  });
</script>
